    <style id="gds-style-overrides">
/* GDS-style overrides derived from service-journey.scss */
:root {
  --bg: #f8f8f8;
  --panel: #ffffff;
  --panel-2: #f3f2f1;
  --border: #b1b4b6;
  --muted: #505a5f;
  --text: #0b0c0c;
  --accent: #1d70b8;
  --focus: #ffdd00;
  color-scheme: light;
  color: #0b0c0c;
  background: #f8f8f8;
  font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
  font-synthesis: none;
  text-rendering: optimizeLegibility;
}

body {
  background: #f8f8f8;
  color: #0b0c0c;
  font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
}

#app::after {
  content: "GDS";
  position: fixed;
  left: 34px;
  bottom: 34px;
  z-index: 50;
  background: #00e5e5;
  color: #0b0c0c;
  padding: 3px 8px 4px;
  font-size: 30px;
  line-height: 1;
  font-weight: 500;
  font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
  font-style: normal;
  pointer-events: none;
}

.toolbar {
  height: 88px;
  padding: 14px 24px;
  gap: 24px;
  background: #ffffff;
  border-bottom: 4px solid #0b0c0c;
  box-shadow: none;
}

.title-block h1 {
  color: #0b0c0c;
  font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
  font-size: 24px;
  font-weight: 500;
  letter-spacing: -0.035em;
  line-height: 1.05;
}

.title-block p {
  color: #505a5f;
  margin-top: 6px;
  font-size: 13px;
  line-height: 1.25;
}

#node-search {
  height: 42px;
  padding: 5px 10px;
  border: 2px solid #0b0c0c;
  border-radius: 0;
  background: #ffffff;
  color: #0b0c0c;
  box-shadow: none;
}

#node-search::placeholder {
  color: #505a5f;
  opacity: 1;
}

#node-search:focus {
  border-color: #0b0c0c;
  outline: 3px solid #ffdd00;
  outline-offset: 0;
  box-shadow: inset 0 0 0 2px #0b0c0c;
}

.search-results {
  top: calc(100% + 4px);
  max-height: 360px;
  padding: 0;
  border: 2px solid #0b0c0c;
  border-radius: 0;
  background: #ffffff;
  box-shadow: 0 8px 18px rgba(11, 12, 12, 0.18);
}

.search-result {
  border: 0;
  border-bottom: 1px solid #b1b4b6;
  border-radius: 0;
  background: #ffffff;
  color: #0b0c0c;
  padding: 10px 12px;
}

.search-result:last-child {
  border-bottom: 0;
}

.search-result:hover,
.search-result:focus {
  background: #f3f2f1;
  color: #0b0c0c;
  outline: 3px solid #ffdd00;
  outline-offset: -3px;
}

.search-result strong {
  font-size: 14px;
  font-weight: 700;
}

.search-result span {
  color: #505a5f;
  font-size: 12px;
}

.toolbar-actions {
  gap: 10px;
}

.toolbar-actions button {
  min-width: 40px;
  height: 38px;
  padding: 0 12px;
  border: 2px solid #0b0c0c;
  border-radius: 0;
  background: #ffffff;
  color: #0b0c0c;
  box-shadow: 0 2px 0 #0b0c0c;
  font-weight: 700;
}

.toolbar-actions button:hover:not(:disabled) {
  background: #f3f2f1;
  border-color: #0b0c0c;
}

.toolbar-actions button:active:not(:disabled) {
  transform: translateY(2px);
  box-shadow: none;
}

.toolbar-actions button:focus-visible {
  outline: 3px solid #ffdd00;
  outline-offset: 0;
  box-shadow: 0 2px 0 #0b0c0c, inset 0 0 0 2px #0b0c0c;
}

.toolbar-actions button:disabled {
  color: #505a5f;
  background: #f3f2f1;
  opacity: 0.55;
  box-shadow: none;
}

.workspace {
  height: calc(100% - 88px);
  grid-template-columns: minmax(0, 1fr) 380px;
}

.graph-shell {
  background: #f8f8f8;
}

.graph-help {
  left: 112px;
  bottom: 34px;
  padding: 8px 12px;
  border: 1px solid #b1b4b6;
  border-radius: 0;
  background: rgba(255, 255, 255, 0.96);
  color: #505a5f;
  font-size: 12px;
  line-height: 1.25;
}

.loading {
  background: #f8f8f8;
  color: #505a5f;
  font-size: 16px;
  font-weight: 500;
}

.loading.error {
  color: #d4351c;
}

.details {
  padding: 28px 26px 48px;
  background: #ffffff;
  border-left: 4px solid #0b0c0c;
  color: #0b0c0c;
}

.details h2,
.details h3 {
  color: #0b0c0c;
  font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
  font-weight: 500;
  letter-spacing: -0.035em;
  text-transform: none;
}

.details h2 {
  margin: 0 0 12px;
  font-size: 26px;
  line-height: 1.05;
}

.details h3 {
  margin: 28px 0 10px;
  font-size: 18px;
  line-height: 1.15;
}

.details p {
  margin: 10px 0;
  font-size: 15px;
  line-height: 1.45;
}

.details ul {
  margin: 8px 0 0;
  padding-left: 22px;
}

.details li {
  margin: 7px 0;
  font-size: 14px;
  line-height: 1.4;
}

.details a,
.route button {
  color: #1d70b8;
  text-decoration: underline;
  text-underline-offset: 0.12em;
}

.details a:hover,
.route button:hover {
  color: #003078;
  text-decoration-thickness: 3px;
}

.details a:focus-visible,
.route button:focus-visible {
  color: #0b0c0c;
  background: #ffdd00;
  outline: 3px solid #ffdd00;
  outline-offset: 0;
  box-shadow: 0 4px 0 #0b0c0c;
  text-decoration: none;
}

.details code {
  color: #0b0c0c;
  font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  font-size: 12px;
}

.details pre {
  margin: 10px 0;
  padding: 14px 16px;
  border: 1px solid #b1b4b6;
  border-radius: 0;
  background: #f8f8f8;
  color: #0b0c0c;
  font-size: 12px;
  line-height: 1.45;
  box-shadow: none;
}

.details-empty {
  color: #505a5f;
}

.type-pill {
  padding: 4px 8px;
  border: 1px solid #505a5f;
  border-radius: 0;
  background: #f3f2f1;
  color: #0b0c0c;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.04em;
}

.route-list {
  gap: 12px;
}

.route {
  padding: 12px 14px;
  border: 0;
  border-left: 6px solid #1d70b8;
  border-radius: 0;
  background: #f8f8f8;
}

.route strong {
  color: #0b0c0c;
  font-size: 13px;
  font-weight: 700;
}

.route button {
  margin-top: 7px;
  color: #1d70b8;
  font-size: 12px;
}

.edge-path {
  stroke: #505a5f;
  stroke-width: 1.6px;
  opacity: 0.76;
}

.edge-path.highlighted {
  stroke: #0b0c0c;
  stroke-width: 3px;
}

.edge-label rect {
  fill: #ffffff;
  stroke: #b1b4b6;
  stroke-width: 1px;
  rx: 0;
}

.edge-label text {
  fill: #0b0c0c;
  font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
  font-size: 10px;
  font-weight: 500;
}

.edge-label.highlighted rect {
  fill: #ffdd00;
  stroke: #0b0c0c;
  stroke-width: 2px;
}

.node .node-shape {
  stroke: #0b0c0c;
  stroke-width: 1.5px;
}

.node:hover .node-shape {
  stroke: #0b0c0c;
  stroke-width: 3px;
}

.node.selected .node-shape {
  stroke: #0b0c0c;
  stroke-width: 4px;
  filter: drop-shadow(0 0 0 #ffdd00) drop-shadow(5px 5px 0 #ffdd00);
}

.node text {
  fill: #ffffff;
  font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
}

.node .node-type {
  fill: rgba(255, 255, 255, 0.82);
  font-size: 9px;
  letter-spacing: 0.06em;
}

.node .node-label {
  font-size: 11.5px;
  font-weight: 700;
}

.node .node-id {
  fill: rgba(255, 255, 255, 0.76);
  font-size: 9px;
}

.node.start .node-shape,
.node.outcome.eligible .node-shape {
  fill: #00703c;
}

.node.boolean_question .node-shape,
.node.conditional_check .node-shape {
  fill: #1d70b8;
}

.node.multi_path_check .node-shape {
  fill: #4c2c92;
}

.node.criteria_check .node-shape,
.node.complex_criteria .node-shape {
  fill: #d4351c;
}

.node.routing .node-shape {
  fill: #505a5f;
}

.node.outcome.ineligible .node-shape {
  fill: #d4351c;
}

.node.outcome.indeterminate .node-shape {
  fill: #ffdd00;
}

.node.outcome.indeterminate text,
.node.outcome.indeterminate .node-type,
.node.outcome.indeterminate .node-id {
  fill: #0b0c0c;
}

.node.unknown .node-shape {
  fill: #b1b4b6;
}

.node.unknown text,
.node.unknown .node-type,
.node.unknown .node-id {
  fill: #0b0c0c;
}

@media (max-width: 1050px) {
  .toolbar {
    height: 126px;
    grid-template-columns: minmax(200px, 0.8fr) minmax(220px, 1fr);
  }

  .workspace {
    height: calc(100% - 126px);
    grid-template-columns: minmax(0, 1fr) 340px;
  }
}

@media (max-width: 760px) {
  #app::after {
    left: 18px;
    bottom: 18px;
    font-size: 24px;
  }

  .toolbar {
    height: auto;
    padding: 16px 18px 18px;
  }

  .workspace {
    min-height: calc(100vh - 190px);
  }

  .details {
    min-height: 280px;
    border-top: 4px solid #0b0c0c;
    border-left: 0;
  }
}

    </style>
</head>
  <body>
    <div id="app">
      <header class="toolbar">
        <div class="title-block">
          <h1 id="graph-title">Decision tree</h1>
          <p id="graph-summary">Loading...</p>
        </div>

        <div class="search-wrap">
          <label class="sr-only" for="node-search">Find a node</label>
          <input id="node-search" type="search" placeholder="Find a node..." autocomplete="off" />
          <div id="search-results" class="search-results" hidden></div>
        </div>

        <div class="toolbar-actions" aria-label="Graph controls">
          <button id="zoom-out" type="button" title="Zoom out" aria-label="Zoom out">−</button>
          <button id="zoom-in" type="button" title="Zoom in" aria-label="Zoom in">+</button>
          <button id="fit-graph" type="button">Fit</button>
          <button id="toggle-direction" type="button" title="Switch between top-to-bottom and left-to-right layouts">Top ↓</button>
          <button id="focus-selected" type="button" disabled>Focus branch</button>
          <button id="show-all" type="button" disabled>Show all</button>
        </div>
      </header>

      <main class="workspace">
        <section id="graph-shell" class="graph-shell" aria-label="Interactive decision tree">
          <svg id="graph" role="img" aria-labelledby="graph-title graph-summary"></svg>
          <div class="graph-help">Drag to pan · Scroll or pinch to zoom · Click a node for details · Press / to search</div>
          <div id="loading" class="loading">Loading graph...</div>
        </section>

        <aside id="details" class="details" aria-live="polite">
          <div class="details-empty">
            <h2>Node details</h2>
            <p>Select a node to inspect its question, criteria and outgoing routes.</p>
          </div>
        </aside>
      </main>
    </div>
  </body>
</html>
