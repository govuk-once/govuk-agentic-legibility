<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="color-scheme" content="light">

  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: white;
    }

    #diagram {
      width: 100%;
      height: 100%;
      display: block;
    }
  </style>

  <script src="svg-pan-zoom.min.js"></script>
</head>

<body>
  <object
    id="diagram"
    type="image/svg+xml"
    data="img/hld.svg">
  </object>

  <script>
    const diagram = document.getElementById("diagram");

    diagram.addEventListener("load", () => {
      const panZoom = svgPanZoom(diagram, {
        panEnabled: true,
        zoomEnabled: true,
        dblClickZoomEnabled: true,
        mouseWheelZoomEnabled: true,
        preventMouseEventsDefault: true,
        zoomScaleSensitivity: 0.2,
        minZoom: 0.5,
        maxZoom: 10,
        fit: true,
        center: true
      });

      panZoom.resize();
      panZoom.fit();
      panZoom.center();

    });
  </script>
</body>
</html>
